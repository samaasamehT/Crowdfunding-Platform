<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة المستخدم - منصة دعمي</title>
    <link rel="stylesheet" href="user.css">
</head>
<body>

    <nav class="navbar">
        <a href="guest.html" class="nav-brand">منصة دعمي</a>
        <div class="nav-links">
            <a href="guest.html">المشاريع المعتمدة</a>
            <a href="javascript:void(0)" onclick="logout()">تسجيل الخروج</a>
        </div>
    </nav>

    <div class="container">
        <div class="main-content">
            <h1>مرحباً بك، <span id="userNameDisplay">...</span></h1>
            
            <div class="form-box">
                <h3>إنشاء حملة جديدة</h3>
                <input type="text" id="t" placeholder="عنوان المشروع">
                <input type="text" id="nationalId" placeholder="الرقم القومي (14 رقم)" maxlength="14">
                <textarea id="desc" rows="3" placeholder="وصف المشروع..."></textarea>
                <input type="number" id="g" placeholder="المبلغ المستهدف ($)">
                <input type="date" id="d">
                <input type="file" id="i" accept="image/*">
                <button class="btn-send" onclick="create()">إرسال للمراجعة</button>
            </div>

            <h3>حملاتك الحالية</h3>
            <table>
                <thead>
                    <tr>
                        <th>الصورة</th>
                        <th>العنوان</th>
                        <th>الهوية</th>
                        <th>الوصف</th>
                        <th>الهدف</th>
                        <th>الحالة</th>
                    </tr>
                </thead>
                <tbody id="list"></tbody>
            </table>
        </div>

        <div class="side-banner">
            <h2>معاً<br>لندعم<br>مشروعك</h2>
            <p>أفكارك تستحق الدعم، ابدأ الآن</p>
        </div>
    </div>

    <script src="user.js"></script>
</body>
</html>
