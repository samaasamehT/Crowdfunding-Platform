<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>إتمام عملية الدعم - الدفع الإلكتروني</title>
    <link rel="stylesheet" href="payment.css">
</head>
<body>

    <div class="payment-container">
        <div class="card-visual">
            <div class="chip"></div>
            <div class="card-number" id="card-num-display">#### #### #### ####</div>
            <div class="card-details">
                <div class="holder">
                    <span>صاحب الكارت</span>
                    <div id="card-holder-display">اسم المستخدم</div>
                </div>
                <div class="expires">
                    <span>ينتهي في</span>
                    <div id="card-expiry-display">MM/YY</div>
                </div>
            </div>
        </div>

        <div class="payment-form">
            <h2>بيانات الدفع</h2>
            
            <label>اسم صاحب الكارت</label>
            <input type="text" id="holder-input" placeholder="الاسم بالكامل" oninput="updateCard()">

            <label>رقم الكارت</label>
            <input type="text" id="num-input" maxlength="16" placeholder="0000 0000 0000 0000" oninput="updateCard()">

            <div class="row">
                <div class="col">
                    <label>تاريخ الانتهاء</label>
                    <input type="text" id="expiry-input" placeholder="MM/YY" maxlength="5" oninput="updateCard()">
                </div>
                <div class="col">
                    <label>رمز الأمان (CVV)</label>
                    <input type="password" maxlength="3" placeholder="***">
                </div>
            </div>

            <label>مبلغ الدعم ($)</label>
            <input type="number" placeholder="أدخل المبلغ">

            <button class="pay-btn" onclick="processPayment()">تأكيد الدفع والتبّرع</button>
            <button class="back-btn" onclick="history.back()">إلغاء</button>
        </div>
    </div>

    <script>
        function updateCard() {
            document.getElementById('card-holder-display').innerText = document.getElementById('holder-input').value || "اسم المستخدم";
            document.getElementById('card-num-display').innerText = document.getElementById('num-input').value.replace(/(.{4})/g, '$1 ') || "#### #### #### ####";
            document.getElementById('card-expiry-display').innerText = document.getElementById('expiry-input').value || "MM/YY";
        }

        function processPayment() {
            alert("تمت عملية الدفع بنجاح! شكراً لدعمك.");
            window.location.href = 'guest.html';
        }
    </script>
</body>
</html>
