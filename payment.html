<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>إتمام عملية الدعم - الدفع الإلكتروني</title>
    <link rel="stylesheet" href="payment.css">
</head>
<body>

    <div class="payment-container">
        <div class="card-visual">
            <div class="chip"></div>
            <div class="card-number" id="card-num-display">#### #### #### ####</div>
            <div class="card-details">
                <div class="holder">
                    <span>صاحب الكارت</span>
                    <div id="card-holder-display">اسم المستخدم</div>
                </div>
                <div class="expires">
                    <span>ينتهي في</span>
                    <div id="card-expiry-display">MM/YY</div>
                </div>
            </div>
        </div>

        <div class="payment-form">
            <h2>بيانات الدفع</h2>
            
            <label>اسم صاحب الكارت</label>
            <input type="text" id="holder-input" placeholder="الاسم بالكامل" oninput="updateCardVisual()">

            <label>رقم الكارت (16 رقم)</label>
            <input type="text" id="num-input" maxlength="16" placeholder="0000 0000 0000 0000" oninput="validateNumbers(this); updateCardVisual()">

            <div class="row">
                <div class="col">
                    <label>تاريخ الانتهاء (MM/YY)</label>
                    <input type="text" id="expiry-input" placeholder="MM/YY" maxlength="5" oninput="validateExpiry(this); updateCardVisual()">
                </div>
                <div class="col">
                    <label>رمز الأمان (CVV)</label>
                    <input type="text" id="cvv-input" maxlength="3" placeholder="***" oninput="validateNumbers(this)">
                </div>
            </div>

            <label>مبلغ الدعم ($)</label>
            <input type="number" id="payAmount" placeholder="أدخل المبلغ">

            <button class="pay-btn" onclick="processPayment()">تأكيد الدفع والتبّرع</button>
            <button class="back-btn" type="button" onclick="window.location.href='guest.html'">إلغاء</button>
        </div>
    </div>

    <script src="payment.js"></script>
</body>
</html>
