<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تصفح المشروعات - منصة التمويل</title>
    <link rel="stylesheet" href="guest.css">
</head>
<body>

    <header class="page-header">
        <div class="nav-links" style="text-align: left; padding: 10px;">
            <a href="auth.html" id="loginBtn" style="color: white; text-decoration: none; border: 1px solid white; padding: 5px 15px; border-radius: 5px; font-size: 0.9rem;">تسجيل الدخول</a>
        </div>
        <h1>المشروعات المعتمدة</h1>
        <p>اكتشف وادعم مشاريع المستقبل</p>
    </header>

    <div class="container">
        <div id="grid" class="grid">
            </div>
    </div>

    <script>
        // 1. دالة تحميل البيانات من السيرفر
        async function load() {
            try {
                // جلب المشاريع المعتمدة فقط (isApproved=true)
                const res = await fetch(`http://localhost:3000/campaigns?isApproved=true`);
                const data = await res.json();
                
                const grid = document.getElementById('grid');
                
                if (data.length === 0) {
                    grid.innerHTML = "<p style='grid-column: 1/-1; text-align: center; padding: 50px; color: #888;'>لا توجد مشروعات متاحة حالياً للمراجعة.</p>";
                    return;
                }

                // عرض الكروت مع ربط زرار الدعم بالدالة الجديدة
                grid.innerHTML = data.map(c => `
                    <div class="card">
                        <div class="card-img">
                            <img src="${c.image}" alt="${c.title}">
                        </div>
                        <div class="card-content">
                            <h3>${c.title}</h3>
                            <div class="info">
                                <p class="goal"><strong>المبلغ المستهدف:</strong> $${c.goal}</p>
                                <p class="deadline"><strong>تاريخ الانتهاء:</strong> 📅 ${c.deadline}</p>
                            </div>
                            <button class="btn-support" onclick="checkAuthAndPay()">دعم المشروع الآن</button>
                        </div>
                    </div>
                `).join('');

                // تحديث زرار الهيدر لو المستخدم مسجل دخول فعلاً
              

            } catch (error) {
                console.error("خطأ في تحميل البيانات:", error);
                document.getElementById('grid').innerHTML = "<p style='grid-column: 1/-1; text-align: center; color: red;'>تأكدي من تشغيل json-server أولاً!</p>";
            }
        }

        // 2. دالة التحقق من الهوية قبل الدفع
        function checkAuthAndPay() {
            const userData = localStorage.getItem('user');
            
            if (userData) {
                // إذا كان المستخدم مسجلاً، نتوجه لصفحة الدفع
                window.location.href = 'payment.html';
            } else {
                // إذا لم يكن مسجلاً، نسأله أولاً
                const confirmLogin = confirm("لدعم هذا المشروع، يجب تسجيل الدخول أولاً. هل تريد الانتقال لصفحة تسجيل الدخول؟");
                if (confirmLogin) {
                    window.location.href = 'auth.html';
                }
            }
        }

        window.onload = load;
    </script>
</body>
</html>
