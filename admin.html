<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة الإدارة - إدارة الحملات والمستخدمين</title>
    <link rel="stylesheet" href="admin.css">
</head>

<body>

    <h1>لوحة تحكم الإدارة</h1>

    <section class="section-box">
        <h3>⏳ حملات بانتظار المراجعة</h3>
        <table>
            <thead>
                <tr>
                    <th>صورة المشروع</th>
                    <th>عنوان الحملة</th>
                    <th>المبلغ المطلوب</th>
                    <th>تاريخ الانتهاء</th>
                    <th>الإجراء</th>
                </tr>
            </thead>
            <tbody id="pendingList">
                </tbody>
        </table>
    </section>

    <section class="section-box">
        <h3>✅ الحملات التي تمت الموافقة عليها</h3>
        <table>
            <thead class="approved-header">
                <tr>
                    <th>صورة المشروع</th>
                    <th>عنوان الحملة</th>
                    <th>المبلغ المطلوب</th>
                    <th>تاريخ الانتهاء</th>
                    <th>الإجراء</th>
                </tr>
            </thead>
            <tbody id="approvedList">
                </tbody>
        </table>
    </section>

    <hr>

    <section class="section-box">
        <h3>👥 إدارة مستخدمي المنصة (Sellers)</h3>
        <div id="usersList">
            </div>
    </section>

    <script>
        const API_BASE = "http://localhost:3000";

        async function loadDashboard() {
            try {
                const [campRes, userRes] = await Promise.all([
                    fetch(`${API_BASE}/campaigns`),
                    fetch(`${API_BASE}/users?role=user`)
                ]);

                const campaigns = await campRes.json();
                const users = await userRes.json();

                // عرض المعلقين
                const pendingHTML = campaigns.filter(c => !c.isApproved).map(c => `
                    <tr>
                        <td><img src="${c.image}" alt="img"></td>
                        <td><strong>${c.title}</strong></td>
                        <td>$${c.goal}</td>
                        <td>${c.deadline}</td>
                        <td>
                            <button class="btn btn-approve" onclick="updateStatus('${c.id}', true)">موافقة</button>
                            <button class="btn btn-reject" onclick="deleteItem('${c.id}', 'campaigns')">رفض</button>
                        </td>
                    </tr>
                `).join('') || '<tr><td colspan="5">لا يوجد طلبات معلقة حالياً</td></tr>';

                // عرض المقبولين
                const approvedHTML = campaigns.filter(c => c.isApproved).map(c => `
                    <tr>
                        <td><img src="${c.image}" alt="img"></td>
                        <td><strong>${c.title}</strong></td>
                        <td>$${c.goal}</td>
                        <td>${c.deadline}</td>
                        <td>
                            <button class="btn btn-reject" onclick="deleteItem('${c.id}', 'campaigns')">حذف المشروع</button>
                        </td>
                    </tr>
                `).join('') || '<tr><td colspan="5">لا توجد مشاريع نشطة حالياً</td></tr>';

                document.getElementById('pendingList').innerHTML = pendingHTML;
                document.getElementById('approvedList').innerHTML = approvedHTML;

                // عرض المستخدمين
                document.getElementById('usersList').innerHTML = users.map(u => `
                    <div class="user-card">
                        <div>
                            <strong>${u.email}</strong> 
                            <span class="${u.isActive ? 'status-active' : 'status-blocked'}">
                                (${u.isActive ? 'نشط' : 'محظور'})
                            </span>
                        </div>
                        <button class="btn btn-toggle" onclick="toggleUser('${u.id}', ${!u.isActive})">
                            ${u.isActive ? 'حظر الحساب' : 'إلغاء الحظر'}
                        </button>
                    </div>
                `).join('');

            } catch (error) {
                console.error("حدث خطأ:", error);
            }
        }

        async function updateStatus(id, status) {
            await fetch(`${API_BASE}/campaigns/${id}`, {
                method: 'PATCH',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ isApproved: status })
            });
            loadDashboard();
        }

        async function deleteItem(id, endpoint) {
            if (confirm("هل أنت متأكد من حذف هذا العنصر نهائياً؟")) {
                await fetch(`${API_BASE}/${endpoint}/${id}`, { method: 'DELETE' });
                loadDashboard();
            }
        }

        async function toggleUser(id, newStatus) {
            await fetch(`${API_BASE}/users/${id}`, {
                method: 'PATCH',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ isActive: newStatus })
            });
            loadDashboard();
        }

        window.onload = loadDashboard;
    </script>
</body>
</html>
